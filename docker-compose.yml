# ──────────────────────────────────────
# CCTaskScoring 容器编排
# ──────────────────────────────────────

networks:
  scoring-net:
    driver: bridge

services:
  # ── Neo4j 图数据库 ──
  neo4j:
    image: neo4j:5.15-community
    container_name: cc-neo4j
    networks:
      - scoring-net
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7474:7474"   # Bolt 协议
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=[]
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/init:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── 评分服务 ──
  scoreservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-scoreservice
    networks:
      - scoring-net
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__Default=Data Source=/app/data/scoring.db
      - Neo4j__Uri=${NEO4J_URI:-bolt://neo4j:7687}
      - Neo4j__User=neo4j
      - Neo4j__Password=${NEO4J_PASSWORD:-password}
      - Mcp__ApiKey=${MCP_API_KEY:-}
      - Mcp__Endpoint=${MCP_ENDPOINT:-https://api.anthropic.com}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
